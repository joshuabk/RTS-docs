{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <p class="eyebrow">RTS Register</p>
    <h1>Sign in</h1>
    {% if form.errors %}
      <div class="nonfield">Your username and password didn't match. Please try again.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <label for="id_username">Username</label>
        <input class="form-control" type="text" name="username" id="id_username" autofocus required>
      </div>
      <div class="form-row">
        <label for="id_password">Password</label>
        <input class="form-control" type="password" name="password" id="id_password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign in</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</div>
{% endblock %}
